name: OCI grab A1 instance
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}
env:
  OCI_CLI_USER:        ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY:     ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  OCI_CLI_REGION:      ${{ secrets.OCI_CLI_REGION }}
  STACK_ID:            ${{ secrets.OCI_STACK_ID }}
  COMPARTMENT_ID:      ${{ secrets.OCI_COMPARTMENT_ID }}
  DISPLAY_NAME:        "instance-20260607-2018"
  TG_TOKEN:            ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TG_CHAT:             ${{ secrets.TELEGRAM_CHAT_ID }}
jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli
      - name: Skip if instance already running
        id: check
        run: |
          RUNNING=$(oci compute instance list --compartment-id "$COMPARTMENT_ID" --display-name "$DISPLAY_NAME" --lifecycle-state RUNNING --query 'data[0].id' --raw-output 2>/dev/null || true)
          if [ -n "$RUNNING" ] && [ "$RUNNING" != "null" ]; then
            echo "Instance exists: $RUNNING"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No running instance — will try apply."
